<h2>Reports</h2>

<div class="cards">
  <div class="card">
    <h3>Total Inspections</h3>
    <div class="metric">{{ inspectionsCount }}</div>
  </div>
  <div class="card">
    <h3>Submitted Inspections</h3>
    <div class="metric">{{ submittedInspections }}</div>
  </div>
  <div class="card">
    <h3>Actions (Total)</h3>
    <div class="metric">{{ actionsTotal }}</div>
  </div>
  <div class="card">
    <h3>Actions Done</h3>
    <div class="metric">{{ actionsDone }}</div>
  </div>
</div>

<p class="muted" style="margin-top:1rem;">For the MVP, charts and PDF export are not included. Data is calculated from local storage.</p>
